<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide Gallery</title>
<style>
  /* ── Token system ─────────────────────────────────── */
  :root {
    --bg:       #F7F7F6;
    --surface:  #FFFFFF;
    --border:   #E4E4E0;
    --text:     #1A1A18;
    --muted:    #8A8A82;
    --accent:   #1A1A18;
    --tag-bg:   #EFEFEC;
    --tag-hover:#1A1A18;
    --sidebar-w: 240px;
    --font-sans: 'Inter', 'Hiragino Sans', 'Meiryo', sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Layout ───────────────────────────────────────── */
  #app { display: flex; min-height: 100vh; }

  /* ── Sidebar ──────────────────────────────────────── */
  #sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }

  .sidebar-logo span {
    display: block;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin-top: 2px;
  }

  /* "すべて表示" リンク */
  .show-all-btn {
    display: block;
    margin: 12px 20px 0;
    padding: 6px 0;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    text-align: left;
    font-family: var(--font-sans);
    transition: color .15s;
  }
  .show-all-btn:hover { color: var(--text); }

  /* Tree nav */
  .tree { padding: 12px 0 24px; flex: 1; }

  .tree-category { margin-bottom: 4px; }

  .tree-cat-label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    transition: color .15s;
  }
  .tree-cat-label:hover { color: var(--text); }

  .tree-arrow {
    width: 12px;
    height: 12px;
    transition: transform .2s;
    flex-shrink: 0;
  }
  .tree-arrow.open { transform: rotate(90deg); }

  .tree-sub { display: none; }
  .tree-sub.open { display: block; }

  .tree-parent-label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 20px 5px 32px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    transition: background .15s;
    border-radius: 0;
  }
  .tree-parent-label:hover { background: var(--tag-bg); }

  .tree-parent-arrow {
    width: 10px;
    height: 10px;
    transition: transform .2s;
    flex-shrink: 0;
    color: var(--muted);
  }
  .tree-parent-arrow.open { transform: rotate(90deg); }

  .tree-leaves { display: none; }
  .tree-leaves.open { display: block; }

  .tree-leaf {
    display: block;
    padding: 4px 20px 4px 50px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: color .15s, background .15s;
    border-radius: 0;
  }
  .tree-leaf:hover { color: var(--text); background: var(--tag-bg); }
  .tree-leaf.active { color: var(--text); font-weight: 600; }

  /* ── Main ─────────────────────────────────────────── */
  #main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  .main-header {
    padding: 24px 32px 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
  }

  .main-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .main-count {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 2px;
  }

  /* Search */
  .search-wrap {
    position: relative;
  }
  #search {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px 7px 32px;
    font-size: 13px;
    font-family: var(--font-sans);
    background: var(--surface);
    color: var(--text);
    width: 200px;
    outline: none;
    transition: border-color .15s;
  }
  #search:focus { border-color: var(--text); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  /* Grid */
  #grid {
    padding: 20px 32px 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow .2s, transform .2s;
  }
  .card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
    transform: translateY(-2px);
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: var(--tag-bg);
  }

  .card-body {
    padding: 10px 12px 12px;
  }

  .card-company {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }

  .tag {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--muted);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 100px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .tag:hover {
    background: var(--tag-hover);
    color: #fff;
  }

  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
    font-size: 14px;
  }

  /* ── Modal ────────────────────────────────────────── */
  #modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #modal-bg.open { display: flex; }

  #modal {
    background: var(--surface);
    border-radius: 12px;
    max-width: 860px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    display: grid;
    grid-template-columns: 1fr 280px;
    position: relative;
  }

  #modal-img-wrap {
    background: #000;
    border-radius: 12px 0 0 12px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #modal-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    max-height: 70vh;
  }

  #modal-info {
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    border-left: 1px solid var(--border);
  }

  #modal-company {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  #modal-url a {
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    transition: color .15s, border-color .15s;
  }
  #modal-url a:hover { color: var(--text); border-color: var(--text); }

  .modal-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  #modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }

  #modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 28px;
    height: 28px;
    border: none;
    background: var(--tag-bg);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 16px;
    transition: background .15s, color .15s;
  }
  #modal-close:hover { background: var(--border); color: var(--text); }
</style>
</head>
<body>

<div id="app">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Slide Gallery<span>Private Collection</span></div>
    </div>
    <button class="show-all-btn" onclick="filterByTag(null)">すべて表示</button>
    <div class="tree" id="tree"></div>
  </nav>

  <!-- Main -->
  <div id="main">
    <div class="main-header">
      <div>
        <div class="main-title" id="main-title">すべて</div>
        <div class="main-count" id="main-count"></div>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="企業名・タグで検索…">
      </div>
    </div>
    <div id="grid"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal-bg">
  <div id="modal">
    <div id="modal-img-wrap">
      <img id="modal-img" src="" alt="">
    </div>
    <div id="modal-info">
      <button id="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-company"></div>
      <div id="modal-url"></div>
      <div>
        <div class="modal-section-label">タグ</div>
        <div id="modal-tags"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* =========================================================
   DATA  ― ここを編集してスライドを追加・管理します
   ========================================================= */

// カテゴリツリー定義
const TREE = [
  {
    id: "ir",
    label: "IR",
    children: [
      {
        id: "ir-kessan",
        label: "決算資料",
        leaves: ["売上推移", "市場予測", "セグメント分析", "コスト構造"]
      },
      {
        id: "ir-integrated",
        label: "統合報告書",
        leaves: ["サステナビリティ", "マテリアリティ", "ESGデータ"]
      },
      {
        id: "ir-strategy",
        label: "中期経営計画",
        leaves: ["成長戦略", "KPI", "投資計画"]
      }
    ]
  },
  {
    id: "pitch",
    label: "Pitch Deck",
    children: [
      {
        id: "pitch-problem",
        label: "Problem / Solution",
        leaves: ["課題定義", "ソリューション概要", "競合比較"]
      },
      {
        id: "pitch-market",
        label: "Market",
        leaves: ["TAM/SAM/SOM", "市場成長率", "ターゲット顧客"]
      },
      {
        id: "pitch-team",
        label: "Team",
        leaves: ["創業者プロフィール", "組織図", "アドバイザー"]
      }
    ]
  },
  {
    id: "design",
    label: "デザイン表現",
    children: [
      {
        id: "design-chart",
        label: "チャート・グラフ",
        leaves: ["折れ線グラフ", "棒グラフ", "サンキー図", "ヒートマップ"]
      },
      {
        id: "design-layout",
        label: "レイアウト",
        leaves: ["大見出し型", "左右分割", "グリッド型", "フルスクリーン"]
      },
      {
        id: "design-color",
        label: "カラー",
        leaves: ["モノクロ", "ダーク背景", "グラデーション", "パステル"]
      }
    ]
  },
  {
    id: "company",
    label: "業種",
    children: [
      {
        id: "company-tech",
        label: "テック",
        leaves: ["SaaS", "AI/ML", "フィンテック", "ヘルステック"]
      },
      {
        id: "company-mfg",
        label: "製造・素材",
        leaves: ["自動車", "化学", "精密機器"]
      },
      {
        id: "company-consumer",
        label: "消費財・小売",
        leaves: ["D2C", "EC", "食品・飲料"]
      }
    ]
  }
];

// スライドデータ
// 追加するときは以下のオブジェクトをコピーして SLIDES 配列に追加してください
const SLIDES = [
  {
    id: 1,
    company: "Acme Corporation",
    url: "https://example.com/acme-ir",
    image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600&q=80",
    tags: ["売上推移", "市場予測", "折れ線グラフ", "SaaS"]
  },
  {
    id: 2,
    company: "Bright Ventures",
    url: "https://example.com/bright",
    image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&q=80",
    tags: ["課題定義", "TAM/SAM/SOM", "ダーク背景", "AI/ML"]
  },
  {
    id: 3,
    company: "Green Field Foods",
    url: "https://example.com/greenfield",
    image: "https://images.unsplash.com/photo-1543286386-2e659306cd6c?w=600&q=80",
    tags: ["サステナビリティ", "ESGデータ", "グリッド型", "食品・飲料"]
  },
  {
    id: 4,
    company: "Nova Motors",
    url: "https://example.com/nova",
    image: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&q=80",
    tags: ["成長戦略", "KPI", "棒グラフ", "自動車"]
  },
  {
    id: 5,
    company: "Clarity Health",
    url: "https://example.com/clarity",
    image: "https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=600&q=80",
    tags: ["マテリアリティ", "組織図", "モノクロ", "ヘルステック"]
  },
  {
    id: 6,
    company: "DataBridge Inc.",
    url: "https://example.com/databridge",
    image: "https://images.unsplash.com/photo-1504868584819-f8e8b4b6d7e3?w=600&q=80",
    tags: ["セグメント分析", "サンキー図", "フィンテック"]
  },
  {
    id: 7,
    company: "Opus Retail",
    url: "https://example.com/opus",
    image: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=600&q=80",
    tags: ["D2C", "ターゲット顧客", "パステル", "EC"]
  },
  {
    id: 8,
    company: "Skyline SaaS",
    url: "https://example.com/skyline",
    image: "https://images.unsplash.com/photo-1563986768494-4747c8f28e11?w=600&q=80",
    tags: ["投資計画", "競合比較", "グラデーション", "SaaS"]
  }
];

/* =========================================================
   STATE
   ========================================================= */
let activeTag = null;  // null = すべて表示
let searchQuery = "";

/* =========================================================
   BUILD TREE
   ========================================================= */
function buildTree() {
  const container = document.getElementById("tree");
  container.innerHTML = "";

  TREE.forEach(cat => {
    const catEl = document.createElement("div");
    catEl.className = "tree-category";

    const catLabel = document.createElement("div");
    catLabel.className = "tree-cat-label";
    catLabel.innerHTML = `
      <svg class="tree-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M9 18l6-6-6-6"/>
      </svg>
      ${cat.label}`;
    catLabel.addEventListener("click", () => {
      const sub = catEl.querySelector(".tree-sub");
      const arrow = catLabel.querySelector(".tree-arrow");
      sub.classList.toggle("open");
      arrow.classList.toggle("open");
    });

    const sub = document.createElement("div");
    sub.className = "tree-sub";

    cat.children.forEach(parent => {
      const parentLabel = document.createElement("div");
      parentLabel.className = "tree-parent-label";
      parentLabel.innerHTML = `
        <svg class="tree-parent-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M9 18l6-6-6-6"/>
        </svg>
        ${parent.label}`;
      parentLabel.addEventListener("click", () => {
        const leaves = parentLabel.nextElementSibling;
        const arrow = parentLabel.querySelector(".tree-parent-arrow");
        leaves.classList.toggle("open");
        arrow.classList.toggle("open");
      });

      const leaves = document.createElement("div");
      leaves.className = "tree-leaves";

      parent.leaves.forEach(leaf => {
        const leafEl = document.createElement("div");
        leafEl.className = "tree-leaf";
        leafEl.textContent = leaf;
        leafEl.dataset.tag = leaf;
        leafEl.addEventListener("click", () => filterByTag(leaf));
        leaves.appendChild(leafEl);
      });

      sub.appendChild(parentLabel);
      sub.appendChild(leaves);
    });

    catEl.appendChild(catLabel);
    catEl.appendChild(sub);
    container.appendChild(catEl);
  });
}

/* =========================================================
   RENDER GRID
   ========================================================= */
function renderGrid() {
  const grid = document.getElementById("grid");
  const title = document.getElementById("main-title");
  const count = document.getElementById("main-count");
  grid.innerHTML = "";

  const filtered = SLIDES.filter(s => {
    const matchTag = !activeTag || s.tags.includes(activeTag);
    const q = searchQuery.toLowerCase();
    const matchSearch = !q ||
      s.company.toLowerCase().includes(q) ||
      s.tags.some(t => t.toLowerCase().includes(q));
    return matchTag && matchSearch;
  });

  title.textContent = activeTag || "すべて";
  count.textContent = `${filtered.length} 件`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty">該当するスライドがありません</div>`;
    return;
  }

  filtered.forEach(slide => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img class="card-thumb" src="${slide.image}" alt="${slide.company}" loading="lazy">
      <div class="card-body">
        <div class="card-company">${slide.company}</div>
        <div class="card-tags">${slide.tags.map(t => `<span class="tag" data-tag="${t}">${t}</span>`).join("")}</div>
      </div>`;

    // カードクリック → モーダル
    card.querySelector(".card-thumb").addEventListener("click", () => openModal(slide));
    card.querySelector(".card-company").addEventListener("click", () => openModal(slide));

    // タグクリック
    card.querySelectorAll(".tag").forEach(tagEl => {
      tagEl.addEventListener("click", e => {
        e.stopPropagation();
        filterByTag(tagEl.dataset.tag);
      });
    });

    grid.appendChild(card);
  });
}

/* =========================================================
   FILTER
   ========================================================= */
function filterByTag(tag) {
  activeTag = tag;
  // アクティブ状態更新
  document.querySelectorAll(".tree-leaf").forEach(el => {
    el.classList.toggle("active", el.dataset.tag === tag);
  });
  renderGrid();
}

/* =========================================================
   MODAL
   ========================================================= */
function openModal(slide) {
  document.getElementById("modal-img").src = slide.image;
  document.getElementById("modal-img").alt = slide.company;
  document.getElementById("modal-company").textContent = slide.company;
  document.getElementById("modal-url").innerHTML =
    `<a href="${slide.url}" target="_blank" rel="noopener">${slide.url} ↗</a>`;
  document.getElementById("modal-tags").innerHTML =
    slide.tags.map(t =>
      `<span class="tag" style="font-size:12px;padding:4px 10px;" data-tag="${t}">${t}</span>`
    ).join("");

  // タグクリックでモーダルを閉じてフィルター
  document.querySelectorAll("#modal-tags .tag").forEach(el => {
    el.addEventListener("click", () => {
      closeModal();
      filterByTag(el.dataset.tag);
    });
  });

  document.getElementById("modal-bg").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-bg").classList.remove("open");
  document.body.style.overflow = "";
}

// 背景クリックで閉じる
document.getElementById("modal-bg").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeModal();
});

// Esc で閉じる
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

/* =========================================================
   SEARCH
   ========================================================= */
document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderGrid();
});

/* =========================================================
   INIT
   ========================================================= */
buildTree();
renderGrid();
</script>
</body>
</html>
